<style>
    @font-face {
    font-family: "Do Hyeon";
    src: url('font/DoHyeon-Regular.ttf');
    }

    @font-face {
    font-family: "Josefin Sans";
    src: url('font/JosefinSans-Regular.ttf');
    }

    body{
        font-family: "Josefin Sans", sans-serif;
        font-size: 16px;
        color:white;
    }

    .box{
        margin: 10px;
        border-width: 1px;
        border-color: cornflowerblue;
        border-style: solid;
        background-color: #ACACAC;
        padding: 10px;
    }

    .main-wrapper{
    display:grid;
    grid-template-columns: 1fr 2fr 1fr;
  }

    #contentcontent{
    display: absolute;
    position: relative;
    top: 120px;
  }

    .content-border{
      display:fixed;
  }

    .button-wrapper{
        display:grid;
        grid-template-columns: 2fr 1fr;
    }

    #portfolio{
        position:relative;
        height:350px;
        width: 100%;
        background: rgb(64,78,137);
        background: linear-gradient(163deg, rgba(64,78,137,1) 45%, rgba(79,155,226,1) 100%);
        clip-path: polygon(
        0% 0%,     /* top left */
        0% 0%,     /* top left */
        95% 0%,    /* top right */
        100% 11%,   /* top right */
        100% 100%,  /* bottom right */
        100% 100%,  /* bottom right */
        0% 100%,   /* bottom left */
        0 100%      /* bottom left */
        );
    }

    #portfolio h1{
        position: absolute;
        bottom: 50px;
        right: 20px;
        margin:0px;
        color:white;
        font-size: 100px;
        font-family: "Do Hyeon", sans-serif;
        text-shadow: 0px 0px 5px white;
    }

    #portfolio-subtitle{
        position: absolute;
        bottom: 158px;
        right: 20px;
        margin:0px;
        color:white;
        font-size:28px;
    }

    #portfolio-enter{
        position: absolute;
        bottom: 25px;
        right: 20px;
        margin:0px;
        color:white;
        font-size:45px;
    }

    #info{
        width: 100%;
    }

    #personal{
        height: 80px;
        clip-path: polygon(
        0% 0%,     /* top left */
        0% 0%,     /* top left */
        100% 0%,    /* top right */
        100% 0%,   /* top right */
        100% 100%,  /* bottom right */
        100% 100%,  /* bottom right */
        5% 100%,   /* bottom left */
        0% 80%      /* bottom left */
        );
    }

    #personal .box{
        margin-right:10px;
    }

    #personal h1{
        position: absolute;
        bottom: 20px;
        left: 200px;
        margin:0px;
        color:white;
        font-size: 60px;
        font-family: "Do Hyeon", sans-serif;
        text-shadow: 0px 0px 5px white;
    }


  @media only screen and (max-width: 1440px) {
    .section-wrapper{
    display:grid;
    grid-template-columns: 1fr;
  }

  .content-border{
      display:none;
  }

  .button-wrapper{
        display:grid;
        grid-template-columns: 1fr;
    }

    #personal{
        width: 100%;
    }
}

</style>

<body>
    <div class="main-wrapper">
        <div class="content-border"></div>

        <div id="content">
            <div id="contentcontent">
                <img src="img/test_splash.png" style="width:600px;position: absolute;bottom:133px;left:-60px;z-index:999;">
                <div class="box" id="portfolio">
                    <h1>PORTFOLIO</h1>
                    <div id="portfolio-subtitle">
                        2D and 3D Works by MILAZA
                    </div>
                    <div id="portfolio-enter">
                        ENTER ⯈⯈⯈
                    </div>
                </div>
                <div class="button-wrapper">
                    <div class="box" id="personal">
                        <h1>PERSONAL SITE</h1>
                    </div>
                    <div class="box" id="info">
                        milaza.art layout 2.0
                        <br>last updated 23/10/21
                        <br><br>contact@milaza.art
                    </div>
                </div>
            </div>
        </div>

        <div class="content-border"></div>
    </div>
</body>
