<!DOCTYPE html>
<html>
  <head>
    <title>2D PORTFOLIO</title>
    <script src="jquery.js"></script> 
  <script> 
  $(function(){
    $("#sidebar-content").load("menudesktop.html"); 
  });
  $(function(){
    $("#topbar-content").load("menumobile.html"); 
  });
  </script> 
  </head>
  <!-- lightbox -->
    <link rel="stylesheet" href="dist/css/yBox.min.css">
    <script src="dist/js/directive.js"></script>
    <script src="dist/js/yBox.min.js"></script>
 
  <style>
/* ---- grid ---- */

.grid {
    width:100%;
  max-width: 100%;
}

/* clear fix */
.grid:after {
  content: '';
  display: block;
  clear: both;
}

.grid-sizer,
.grid-item {
  width: 33.333%;
}

.grid-item {
  float: left;
}

.grid-item img {
  display: block;
  max-width: 100%;
}

  @media only screen and (max-width: 1440px) {
    .grid-sizer,
    .grid-item {
  width: 50%;

  }
}

</style>
<script src="index.js"></script>
<link rel="stylesheet" href="style.css">

<body>
  <div class="wrapper">
  <!-- MENU -->
  <div id="sidebar">
    <div id="sidebar-content"></div>
  </div>
  <div id="topbar">
    <div id="topbar-content"></div>
  </div>
  
  <div id="content">
        <div class="grid">
          <div class="grid-sizer"></div>
                <div class="grid-item">
                      <a href="img\2D\2D_yakuza.png" class="yBox" data-ybox-group="group1">
                          <img src="img\2D\2D_yakuza.png" alt="image" />
                        </a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_majiplush.png" class="yBox" data-ybox-group="group1">
                        <img src="img\2D\2D_majiplush.png" alt="image" />
                      </a>
                </div>
                <div class="grid-item">
                  <a href="img\2D\2D_cave.png" class="yBox" data-ybox-group="group1">
                  <img src="img\2D\2D_cave.png" />
                  </a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_fatalfurry.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_fatalfurry.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_onepiece.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_onepiece.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_junepei.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_junepei.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_korekaramoaidoru.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_korekaramoaidoru.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_shinsoku.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_shinsoku.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_trucy.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_trucy.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_jupiter.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_jupiter.png" /></a>
                </div>
                <div class="grid-item">
                    <a href="img\2D\2D_ema.png" class="yBox" data-ybox-group="group1"><img src="img\2D\2D_ema.png" /></a>
                </div>
        </div>
  </div>
  </div>

  <!-- SCRIPTS-->

  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.js"></script>
  <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.js"></script>
  <script>
    // init Masonry
    var grid = document.querySelector('.grid');

    var msnry = new Masonry( grid, {
      itemSelector: '.grid-item',
      columnWidth: '.grid-sizer',
      percentPosition: true
    });

    imagesLoaded( grid ).on( 'progress', function() {
      // layout Masonry after each image loads
      msnry.layout();
    });
  </script>

  <script>
      window.onload = function(){
          if(document.querySelector('.yBox')){
              var myYbox = new yBox();
              myYbox.init();
          };
      }
  </script>

</body>
</html>
